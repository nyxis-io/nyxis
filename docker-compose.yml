services:
  app:
    build:
      context: .
      dockerfile: site/demo/Dockerfile
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - shared_network

  # Requires ../nyxis-drivers/js (run `make sdk` from nyxis/) for /sdk/nxs.js etc.
  nxs:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/markdown-tokens.conf:/etc/nginx/markdown-tokens.conf:ro
      - ./docker/agent-discovery.conf:/etc/nginx/agent-discovery.conf:ro
      - ./site:/var/www/site:ro
      - ./examples:/var/www/examples:ro
      - ../nyxis-drivers/js:/var/www/sdk:ro
    restart: unless-stopped
    networks:
      - shared_network

networks:
  shared_network:
    external: true
