name: Build WASM

on:
  push:
    branches: [main]
    paths:
      - 'bench/wasm/nxs_reducers.c'
      - 'bench/wasm/build.sh'
      - '.github/workflows/build-wasm.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM / Clang
        run: sudo apt-get update && sudo apt-get install -y clang lld

      - name: Build nxs_reducers.wasm
        working-directory: bench/wasm
        run: bash build.sh

      - name: Commit updated WASM binary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild nxs_reducers.wasm [skip ci]"
          file_pattern: bench/wasm/nxs_reducers.wasm
