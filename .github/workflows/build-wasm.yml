name: Build WASM

on:
  push:
    branches: [main]
    paths:
      - 'bench/wasm/nxs_reducers.c'
      - 'bench/wasm/build.sh'
      - '.github/workflows/build-wasm.yml'
  pull_request:
    paths:
      - 'bench/wasm/**'
      - '.github/workflows/build-wasm.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM / Clang
        run: sudo apt-get update && sudo apt-get install -y clang lld

      - name: Build nxs_reducers.wasm
        working-directory: bench/wasm
        run: bash build.sh

      - name: Verify committed WASM matches build
        run: |
          git diff --exit-code bench/wasm/nxs_reducers.wasm || {
            echo "::error::bench/wasm/nxs_reducers.wasm is out of date. Run: bash bench/wasm/build.sh && git add bench/wasm/nxs_reducers.wasm"
            exit 1
          }
