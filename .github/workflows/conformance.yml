name: Conformance

on:
  push:
    branches: [main]
    paths:
      - 'conformance/**'
      - 'rust/**'
      - 'Makefile'
      - '.github/workflows/conformance.yml'
  pull_request:
    paths:
      - 'conformance/**'
      - 'rust/**'
      - 'Makefile'
      - '.github/workflows/conformance.yml'

env:
  DRV: ${{ github.workspace }}/nyxis-drivers

permissions:
  contents: read

jobs:
  generate-vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-conformance-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-conformance-

      - run: make conformance-generate

      - uses: actions/upload-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/
          retention-days: 1

  run-rust:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-conformance-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-conformance-

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-rust

  run-js:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-js
        env:
          DRV: ${{ env.DRV }}

  run-python:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-py
        env:
          DRV: ${{ env.DRV }}

  run-go:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-go
        env:
          DRV: ${{ env.DRV }}

  run-ruby:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-ruby
        env:
          DRV: ${{ env.DRV }}

  run-php:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-php
        env:
          DRV: ${{ env.DRV }}

  run-c:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-c
        env:
          DRV: ${{ env.DRV }}

  run-swift:
    needs: generate-vectors
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-swift
        env:
          DRV: ${{ env.DRV }}

  run-kotlin:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-kotlin
        env:
          DRV: ${{ env.DRV }}

  run-csharp:
    needs: generate-vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: nyxis-io/nyxis-drivers
          path: nyxis-drivers
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - uses: actions/download-artifact@v4
        with:
          name: conformance-vectors-${{ github.sha }}
          path: conformance/

      - run: make conformance-run-csharp
        env:
          DOTNET_FRAMEWORK: net9.0
          DRV: ${{ env.DRV }}
