# Serves Vue SPA (site/dist), benchmark fixtures/wasm, and MIT SDK (/sdk).

user nginx;
worker_processes auto;
error_log /dev/stderr notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    include /etc/nginx/markdown-routes.map;

    # Markdown for Agents: content negotiation via 419 → @markdown_page (all routes).
    map $http_accept $prefer_markdown {
        default 0;
        "~*text/markdown" 1;
    }

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream="$upstream_addr" rt=$request_time urt="$upstream_response_time"';
    access_log /dev/stdout main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 2g;

        # Content-Encoding mirroring: `.nxs` source as text/plain (DevTools Response tab).
        location ^~ /examples/ {
            alias /var/www/examples/;
            default_type text/plain;
            charset utf-8;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /favicon.svg {
            root /var/www/site/dist;
            default_type image/svg+xml;
            add_header Cache-Control "public, max-age=86400";
        }

        # Serve from git-tracked public/ (not dist/) so Content-Signal updates deploy without a full site rebuild.
        location = /robots.txt {
            alias /var/www/site/web/public/robots.txt;
            default_type text/plain;
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
            add_header CDN-Cache-Control "max-age=300" always;
        }

        location = /llms.txt {
            alias /var/www/site/web/public/llms.txt;
            default_type text/plain;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location = /index.md {
            alias /var/www/site/web/public/index.md;
            default_type text/markdown;
            include /etc/nginx/markdown-tokens.conf;
            include /etc/nginx/agent-discovery.conf;
            add_header Cache-Control "public, max-age=3600";
        }

        # Direct .md URLs for bots that do not send Accept: text/markdown.
        location ~ \.md$ {
            root /var/www/site/web/public;
            default_type text/markdown;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location = /index.html {
            root /var/www/site/dist;
            include /etc/nginx/agent-discovery.conf;
            add_header Cache-Control "no-store" always;
        }

        location ^~ /.well-known/ {
            root /var/www/site/dist;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/api-catalog {
            root /var/www/site/dist;
            default_type 'application/linkset+json; profile="https://www.rfc-editor.org/info/rfc9727"';
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/oauth-authorization-server {
            root /var/www/site/dist;
            default_type application/json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/oauth-protected-resource {
            root /var/www/site/dist;
            default_type application/json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/health {
            root /var/www/site/dist;
            default_type application/json;
            add_header Cache-Control "public, max-age=300";
        }

        location = /sitemap.xml {
            root /var/www/site/dist;
            default_type application/xml;
            add_header Cache-Control "public, max-age=86400";
        }

        location ^~ /bench/fixtures/ {
            alias /var/www/site/bench/fixtures/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location ^~ /bench/wasm/ {
            alias /var/www/site/bench/wasm/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location = /bench/bench-worker.js {
            alias /var/www/site/bench/bench-worker.js;
            default_type application/javascript;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        # Vue route /bench/ — must not fall through to dist/bench/ if that dir exists.
        location = /bench/ {
            root /var/www/site/dist;
            try_files /index.html =404;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location = /bench {
            return 301 /bench/;
        }

        location /sdk/ {
            alias /var/www/sdk/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        # Vue SPA homepage — rewrite to /index.html so add_header works (if breaks add_header in-place).
        location = / {
            if ($prefer_markdown) {
                return 419;
            }
            rewrite ^ /index.html last;
        }

        error_page 419 = @markdown_page;
        location @markdown_page {
            root /var/www/site/web/public;
            try_files $markdown_uri =404;
            default_type text/markdown;
            include /etc/nginx/agent-discovery.conf;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location / {
            if ($prefer_markdown) {
                return 419;
            }
            root /var/www/site/dist;
            try_files $uri $uri/ /index.html;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }
    }
}
