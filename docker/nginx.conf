# Serves Vue SPA (site/dist), benchmark fixtures/wasm, and MIT SDK (/sdk).

user nginx;
worker_processes auto;
error_log /dev/stderr notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Markdown for Agents: serve index.md when Accept includes text/markdown.
    map $http_accept $prefer_markdown {
        default 0;
        "~*text/markdown" 1;
    }

    # RFC 8288 / RFC 9727 Link headers for agent discovery (homepage + markdown).
    map $uri $agent_link_header {
        default "";
        "/" "</.well-known/api-catalog>; rel=\"api-catalog\", </.well-known/agent-skills/index.json>; rel=\"describedby\", </.well-known/mcp/server-card.json>; rel=\"service-meta\", <https://github.com/nyxis-io/nyxis/blob/main/SPEC.md>; rel=\"service-desc\", <https://github.com/nyxis-io/nyxis/blob/main/GETTING_STARTED.md>; rel=\"service-doc\"";
        "/index.md" "</.well-known/api-catalog>; rel=\"api-catalog\", </.well-known/agent-skills/index.json>; rel=\"describedby\", </.well-known/mcp/server-card.json>; rel=\"service-meta\", <https://github.com/nyxis-io/nyxis/blob/main/SPEC.md>; rel=\"service-desc\", <https://github.com/nyxis-io/nyxis/blob/main/GETTING_STARTED.md>; rel=\"service-doc\"";
    }

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream="$upstream_addr" rt=$request_time urt="$upstream_response_time"';
    access_log /dev/stdout main;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 2g;

        # Content-Encoding mirroring: `.nxs` source as text/plain (DevTools Response tab).
        location ^~ /examples/ {
            alias /var/www/examples/;
            default_type text/plain;
            charset utf-8;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /favicon.svg {
            root /var/www/site/dist;
            default_type image/svg+xml;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /robots.txt {
            root /var/www/site/dist;
            default_type text/plain;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /index.md {
            root /var/www/site/dist;
            default_type text/markdown;
            include /etc/nginx/markdown-tokens.conf;
            add_header Link $agent_link_header always;
            add_header Cache-Control "public, max-age=3600";
        }

        location ^~ /.well-known/ {
            root /var/www/site/dist;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/api-catalog {
            root /var/www/site/dist;
            default_type 'application/linkset+json; profile="https://www.rfc-editor.org/info/rfc9727"';
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/oauth-authorization-server {
            root /var/www/site/dist;
            default_type application/json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/oauth-protected-resource {
            root /var/www/site/dist;
            default_type application/json;
            add_header Cache-Control "public, max-age=3600";
        }

        location = /.well-known/health {
            root /var/www/site/dist;
            default_type application/json;
            add_header Cache-Control "public, max-age=300";
        }

        location = /sitemap.xml {
            root /var/www/site/dist;
            default_type application/xml;
            add_header Cache-Control "public, max-age=86400";
        }

        location ^~ /bench/fixtures/ {
            alias /var/www/site/bench/fixtures/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location ^~ /bench/wasm/ {
            alias /var/www/site/bench/wasm/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location = /bench/bench-worker.js {
            alias /var/www/site/bench/bench-worker.js;
            default_type application/javascript;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        # Vue route /bench/ — must not fall through to dist/bench/ if that dir exists.
        location = /bench/ {
            root /var/www/site/dist;
            try_files /index.html =404;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location = /bench {
            return 301 /bench/;
        }

        location /sdk/ {
            alias /var/www/sdk/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        # Vue SPA (marketing, demos, bench UI)
        location = / {
            root /var/www/site/dist;
            if ($prefer_markdown) {
                rewrite ^ /index.md last;
            }
            try_files /index.html =404;
            add_header Link $agent_link_header always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location / {
            root /var/www/site/dist;
            try_files $uri $uri/ /index.html;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }
    }
}
