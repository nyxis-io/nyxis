# Serves site (landing, use-cases, pricing), browser demos (site/demo), benchmarks (site/bench), and MIT SDK (/sdk).

user nginx;
worker_processes auto;
error_log /dev/stderr notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream="$upstream_addr" rt=$request_time urt="$upstream_response_time"';
    access_log /dev/stdout main;

    sendfile on;
    keepalive_timeout 65;

    map $uri $coop_headers {
        default 1;
    }

    server {
        listen 80 default_server;
        server_name _;
        client_max_body_size 2g;

        # Content-Encoding mirroring: `.nxs` source as text/plain (DevTools Response tab).
        location ^~ /examples/ {
            alias /var/www/examples/;
            default_type text/plain;
            charset utf-8;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /favicon.svg {
            root /var/www/site;
            default_type image/svg+xml;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /robots.txt {
            root /var/www/site;
            default_type text/plain;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /sitemap.xml {
            root /var/www/site;
            default_type application/xml;
            add_header Cache-Control "public, max-age=86400";
        }

        location = / {
            root /var/www/site;
            try_files /index.html =404;
        }

        location = /use-cases {
            return 301 /use-cases/;
        }

        location /use-cases/ {
            alias /var/www/site/use-cases/;
            index index.html;
            default_type text/html;
        }

        location = /pricing {
            return 301 /pricing/;
        }

        location /pricing/ {
            alias /var/www/site/pricing/;
            index index.html;
            default_type text/html;
        }

        location = /demo {
            return 301 /demo/;
        }

        location /demo/ {
            alias /var/www/site/demo/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location = /bench {
            return 301 /bench/;
        }

        location = /bench/bench.html {
            return 301 /bench/;
        }

        location /bench/ {
            alias /var/www/site/bench/;
            index index.html;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }

        location /sdk/ {
            alias /var/www/sdk/;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "require-corp" always;
            add_header Cross-Origin-Resource-Policy "same-origin" always;
            add_header Cache-Control "no-store" always;
        }
    }
}
