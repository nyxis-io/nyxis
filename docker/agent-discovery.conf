# RFC 8288 / RFC 9727 agent discovery headers (included from homepage locations).
add_header Link '</.well-known/api-catalog>; rel="api-catalog", </.well-known/agent-skills/index.json>; rel="describedby", </.well-known/mcp/server-card.json>; rel="service-meta", <https://github.com/nyxis-io/nyxis/blob/main/SPEC.md>; rel="service-desc", <https://github.com/nyxis-io/nyxis/blob/main/GETTING_STARTED.md>; rel="service-doc"' always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
